<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Art Program</title>
    <style>
        /* Base page alignment */
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: sans-serif;
        }

        /* Start Menu Box */
        .menu-container {
            background-color: #262626;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            width: 350px;
        }

        /* Logo Placeholder */
        .logo-placeholder {
            width: 120px;
            height: 120px;
            background-color: #3d3d3d;
            border: 2px dashed #666;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px auto;
            color: #aaa;
        }

        /* Size Inputs Layout */
        .input-group {
            margin: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .input-group input {
            width: 100px;
            padding: 5px;
            text-align: center;
        }

        /* Proportional Preview Box Box */
        .preview-box {
            margin: 20px auto;
            border: 1px solid #ffffff;
            background-color: #ffffff;
            /* Constraints so it doesn't get infinitely big on screen */
            max-width: 150px;
            max-height: 150px;
        }

        /* Confirm Button */
        .confirm-btn {
            background-color: #007acc;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>

    <div id="startMenu" class="menu-container">
        <div class="logo-placeholder">(insertlogohere)</div>
        
        <h2>Create New Canvas</h2>
        
        <div class="input-group">
            <label for="canvasWidth">Width (PX):</label>
            <input type="number" id="canvasWidth" value="800" min="1">
        </div>
        
        <div class="input-group">
            <label for="canvasHeight">Height (PX):</label>
            <input type="number" id="canvasHeight" value="600" min="1">
        </div>

        <p style="font-size: 14px; color: #aaa; margin-bottom: 5px;">Preview:</p>
        <div id="previewBox" class="preview-box"></div>
        
        <button id="confirmBtn" class="confirm-btn">Confirm</button>
    </div>

    <script>
        const canvasWidthInput = document.getElementById('canvasWidth');
        const canvasHeightInput = document.getElementById('canvasHeight');
        const previewBox = document.getElementById('previewBox');

        // Handles the real-time visual size preview calculation
        function updatePreview() {
            const w = parseInt(canvasWidthInput.value) || 1;
            const h = parseInt(canvasHeightInput.value) || 1;
            const maxDisplaySize = 150;

            if (w >= h) {
                previewBox.style.width = maxDisplaySize + 'px';
                previewBox.style.height = (h / w) * maxDisplaySize + 'px';
            } else {
                previewBox.style.height = maxDisplaySize + 'px';
                previewBox.style.width = (w / h) * maxDisplaySize + 'px';
            }
        }

        canvasWidthInput.addEventListener('input', updatePreview);
        canvasHeightInput.addEventListener('input', updatePreview);

        // Run on initial load
        updatePreview();
    </script>
</body>
</html>
