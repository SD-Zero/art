<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Art Program</title>
    <style>
        /* Base page alignment */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: sans-serif;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Screen Toggling */
        .hidden {
            display: none !important;
        }

        /* Start Menu Box */
        .menu-container {
            background-color: #262626;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            width: 350px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            z-index: 200;
        }

        /* Logo Text Placeholder */
        .logo-text {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 25px;
            color: #007acc;
        }

        /* Size Inputs Layout */
        .input-group {
            margin: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .input-group input {
            width: 100px;
            padding: 5px;
            text-align: center;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
        }

        /* Proportional Preview Box */
        .preview-box {
            margin: 20px auto;
            border: 1px solid #ffffff;
            background-color: #ffffff;
            max-width: 150px;
            max-height: 150px;
        }

        /* Action Buttons */
        .confirm-btn {
            background-color: #007acc;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .file-label {
            display: block;
            background-color: #444;
            color: white;
            padding: 10px 20px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            border: 1px dashed #666;
        }

        .file-label:hover {
            background-color: #555;
        }

        #fileInput {
            display: none;
        }

        /* ART WORKSPACE */
        .workspace {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #1e1e1e;
            touch-action: none;
        }

        /* Viewport container for transforms */
        .transform-container {
            position: absolute;
            transform-origin: center center;
            display: inline-block;
        }

        canvas {
            background-color: #ffffff;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
            border: 1px solid #2d2d2d;
            display: block;
            touch-action: none;
        }

        /* --- TOP BAR UI --- */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 45px;
            background-color: #121212;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 0 15px;
            box-sizing: border-box;
            z-index: 100;
        }

        .icon-btn {
            background: none;
            border: none;
            color: #cccccc;
            padding: 6px 10px;
            margin-right: 10px;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover:not(:disabled), .icon-btn.active {
            background-color: #222222;
            color: #ffffff;
        }

        .icon-btn:disabled {
            color: #444444;
            cursor: not-allowed;
        }

        .icon-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .divider {
            width: 1px;
            height: 24px;
            background-color: #2a2a2a;
            margin: 0 10px 0 0;
        }

        /* Dropdown Menu Styling */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: 40px;
            left: 0;
            background-color: #1c1c1c;
            min-width: 180px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5);
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            z-index: 150;
        }

        .dropdown-content a {
            color: #e0e0e0;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-size: 14px;
        }

        .dropdown-content a:hover {
            background-color: #2a2a2a;
            color: #ffffff;
        }

        .dropdown-divider {
            height: 1px;
            background-color: #2a2a2a;
            margin: 4px 0;
        }

        /* --- COLOR DROPDOWN PANEL UI --- */
        .color-panel {
            display: none;
            position: absolute;
            top: 55px;
            left: 60px;
            background-color: #1c1c1c;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 15px;
            width: 240px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            z-index: 150;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .panel-title {
            font-size: 13px;
            font-weight: bold;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .close-panel-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 18px;
            cursor: pointer;
            padding: 0 5px;
        }

        .close-panel-btn:hover {
            color: #fff;
        }

        .color-wheel-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 12px;
        }

        #colorWheel {
            cursor: crosshair;
            border-radius: 50%;
        }

        .hex-input-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #2a2a2a;
            padding: 5px 10px;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .hex-input-group label {
            font-size: 12px;
            color: #888;
        }

        .hex-input-group input {
            background: none;
            border: none;
            color: #fff;
            width: 80px;
            text-align: right;
            font-family: monospace;
            font-size: 14px;
            outline: none;
        }

        .palette-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            max-height: 100px;
            overflow-y: auto;
        }

        .color-swatch {
            width: 100%;
            padding-top: 100%; 
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
            box-sizing: border-box;
        }

        .color-swatch:hover {
            transform: scale(1.05);
        }

        .show {
            display: block !important;
        }

        /* --- VERTICAL SLIDERS WITH FLOATING VALUES UI --- */
        .left-controls {
            position: absolute;
            left: 20px;
            top: 80px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            z-index: 10;
            background: rgba(18, 18, 18, 0.6);
            padding: 25px 12px 20px 12px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid #2a2a2a;
        }

        .slider-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 45px;
            height: 215px;
        }

        .slider-label {
            font-size: 10px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        /* Dynamic bubble counter display output text position styling */
        .slider-bubble-value {
            font-size: 11px;
            font-weight: bold;
            color: #007acc;
            font-family: monospace;
            height: 14px;
        }

        .slider-container {
            position: relative;
            width: 14px; 
            height: 150px;
            background: #333;
            border-radius: 7px;
            cursor: pointer;
            touch-action: none;
        }

        .slider-track-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #555;
            border-radius: 7px;
            pointer-events: none;
        }

        .slider-handle {
            position: absolute;
            left: 50%;
            bottom: 100%;
            width: 22px; 
            height: 22px;
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 0 2px 6px rgba(0,0,0,0.6);
            transform: translate(-50%, 50%); 
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="startMenu" class="menu-container">
        <div class="logo-text">(insertlogohere)</div>
        
        <h2>Create New Canvas</h2>
        
        <div class="input-group">
            <label for="canvasWidth">Width (PX):</label>
            <input type="number" id="canvasWidth" value="800" min="1">
        </div>
        
        <div class="input-group">
            <label for="canvasHeight">Height (PX):</label>
            <input type="number" id="canvasHeight" value="600" min="1">
        </div>

        <p style="font-size: 14px; color: #aaa; margin-bottom: 5px;">Preview:</p>
        <div id="previewBox" class="preview-box"></div>
        
        <button id="confirmBtn" class="confirm-btn">Confirm</button>
        
        <label for="fileInput" class="file-label">Load from File</label>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <div id="workspace" class="workspace hidden">
        
        <div class="top-bar">
            <div class="dropdown">
                <button id="menuBtn" class="icon-btn" title="Menu">
                    <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
                </button>
                <div id="menuDropdown" class="dropdown-content">
                    <a href="#" id="newFileBtn">New File</a>
                    <div class="dropdown-divider"></div>
                    <a href="#" id="savePngBtn">Save as PNG</a>
                    <a href="#" id="saveJpegBtn">Save as JPEG</a>
                    <a href="#" id="saveSvgBtn">Save as SVG</a>
                    <a href="#" id="saveSpeedpaintBtn">Save Speedpaint</a>
                </div>
            </div>
            
            <button class="icon-btn" id="colorBtn" title="Color">
                <svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 0 0 0 18c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01a1.49 1.49 0 0 1-.22-.84c0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zm-5.5 9a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm3-3a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm4.5 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm3 3a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z"/></svg>
            </button>
            
            <button class="icon-btn active" id="brushBtn" title="Brush">
                <svg viewBox="0 0 24 24"><path d="M7 14c-1.66 0-3 1.34-3 3 0 1.31-1.16 2-2 2 .92.62 2.1 1 3.5 1 2.5 0 4.5-2 4.5-4.5 0-.41-.15-.77-.32-1.15l-1.35-2.7L7 14zm14.37-9c.39-.39.39-1.02 0-1.41L19.41.63a.996.996 0 0 0-1.41 0L6.67 11.96l2.37 2.37L21.37 5z"/></svg>
            </button>

            <button class="icon-btn" id="eraserBtn" title="Eraser">
                <svg viewBox="0 0 24 24"><path d="M16.24 3.56l4.95 4.94c.78.79.78 2.05 0 2.84L12 20.31a2.003 2.003 0 0 1-1.41.59H4v-6.59c0-.53.21-1.04.59-1.41l9.17-9.17c.79-.78 2.05-.78 2.84 0zm-7.07 15.3l1.41 1.41L19.17 11.7l-1.41-1.41-8.59 8.57z"/></svg>
            </button>
            
            <button class="icon-btn" id="transformBtn" title="Transform">
                <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4H9V2H2v7h2V5.41l5.17 5.17 1.42-1.41zM14.5 4l5.17 5.17 1.42-1.41L15.91 4H19V2h-7v7h2V5.41zm-5.33 10.59L4 19.76V16H2v7h7v-2H5.41l5.17-5.17-1.41-1.42zM14.5 14.5l1.41-1.42L21 18.24V15h2v7h-7v-2h3.59l-5.1-5.1z"/></svg>
            </button>
            
            <button class="icon-btn" id="lassoBtn" title="Lasso">
                <svg viewBox="0 0 24 24"><path d="M18.06 13.04c.33-.8.44-1.67.31-2.54A5.942 5.942 0 0 0 13 5.06c-.87-.13-1.74-.02-2.54.31L4.63 2.13 3.37 3.63l5.59 3.19C8.36 7.82 8 8.87 8 10c0 2.76 2.24 5 5 5 .13 0 .26-.01.39-.02l2.37 4.15c-.49.19-.88.56-1.08 1.05-.4.93-.05 2.01.81 2.5a1.99 1.99 0 0 0 2.69-.81c.42-.93.02-2.02-.85-2.5l-2.31-4.04c1.17-.41 2.15-1.21 2.84-2.29l2.76 1.58 1.01-1.73-2.58-1.48zm-5.06.46c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg>
            </button>

            <div class="divider"></div>

            <button class="icon-btn" id="undoBtn" title="Undo" disabled>
                <svg viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg>
            </button>
            <button class="icon-btn" id="redoBtn" title="Redo" disabled>
                <svg viewBox="0 0 24 24"><path d="M11.5 8c2.65 0 5.05.99 6.9 2.6L22 7v9h-9l3.62-3.62c-1.39-1.16-3.16-1.88-5.12-1.88-3.54 0-6.55 2.31-7.6 5.5l-2.37-.78C2.92 11.03 6.85 8 11.5 8z"/></svg>
            </button>
        </div>

        <div id="colorPanel" class="color-panel">
            <div class="panel-header">
                <span class="panel-title">Colors</span>
                <button id="closeColorBtn" class="close-panel-btn">&times;</button>
            </div>
            <div class="color-wheel-wrapper">
                <canvas id="colorWheel" width="180" height="180"></canvas>
            </div>
            <div class="hex-input-group">
                <label for="hexInput">HEX</label>
                <input type="text" id="hexInput" value="#000000" maxlength="7">
            </div>
            <div id="paletteGrid" class="palette-grid"></div>
        </div>

        <div class="left-controls">
            <div class="slider-wrapper">
                <span class="slider-label">Size</span>
                <span id="sizeBubble" class="slider-bubble-value">10</span>
                <div id="sizeSlider" class="slider-container">
                    <div id="sizeTrackFill" class="slider-track-fill"></div>
                    <div id="sizeHandle" class="slider-handle"></div>
                </div>
            </div>
            <div class="slider-wrapper">
                <span class="slider-label">Opac</span>
                <span id="opacBubble" class="slider-bubble-value">100</span>
                <div id="opacSlider" class="slider-container">
                    <div id="opacTrackFill" class="slider-track-fill"></div>
                    <div id="opacHandle" class="slider-handle"></div>
                </div>
            </div>
        </div>

        <div id="transformContainer" class="transform-container">
            <canvas id="paintCanvas"></canvas>
        </div>
    </div>

    <script>
        // UI Navigation Elements
        const startMenu = document.getElementById('startMenu');
        const canvasWidthInput = document.getElementById('canvasWidth');
        const canvasHeightInput = document.getElementById('canvasHeight');
        const previewBox = document.getElementById('previewBox');
        const confirmBtn = document.getElementById('confirmBtn');
        const fileInput = document.getElementById('fileInput');

        const workspace = document.getElementById('workspace');
        const transformContainer = document.getElementById('transformContainer');
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');

        const menuBtn = document.getElementById('menuBtn');
        const menuDropdown = document.getElementById('menuDropdown');
        const colorBtn = document.getElementById('colorBtn');
        const colorPanel = document.getElementById('colorPanel');
        const closeColorBtn = document.getElementById('closeColorBtn');
        const hexInput = document.getElementById('hexInput');
        const paletteGrid = document.getElementById('paletteGrid');
        const colorWheel = document.getElementById('colorWheel');
        const wheelCtx = colorWheel.getContext('2d');

        const undoBtn = document.getElementById('undoBtn');
        const redoBtn = document.getElementById('redoBtn');
        const brushBtn = document.getElementById('brushBtn');
        const eraserBtn = document.getElementById('eraserBtn');

        // Menu Link Targets Elements
        const newFileBtn = document.getElementById('newFileBtn');
        const savePngBtn = document.getElementById('savePngBtn');
        const saveJpegBtn = document.getElementById('saveJpegBtn');
        const saveSvgBtn = document.getElementById('saveSvgBtn');
        const saveSpeedpaintBtn = document.getElementById('saveSpeedpaintBtn');

        // Custom Slider DOM Targets
        const sizeSlider = document.getElementById('sizeSlider');
        const sizeTrackFill = document.getElementById('sizeTrackFill');
        const sizeHandle = document.getElementById('sizeHandle');
        const sizeBubble = document.getElementById('sizeBubble');

        const opacSlider = document.getElementById('opacSlider');
        const opacTrackFill = document.getElementById('opacTrackFill');
        const opacHandle = document.getElementById('opacHandle');
        const opacBubble = document.getElementById('opacBubble');

        // State Tracking Data Variables
        let scale = 1;
        let panX = 0;
        let panY = 0;
        let rotation = 0; 

        let drawing = false;
        let currentBrushSize = 10;
        let currentOpacity = 1.0;
        let activeColor = '#000000';
        let currentTool = 'brush'; // 'brush' or 'eraser'
        let strokeHasPainted = false; 

        let recentColors = Array(20).fill('#ffffff');

        // Undo/Redo Engine State Buffers
        let undoStack = [];
        let redoStack = [];
        const MAX_HISTORY = 20;

        // Speedpaint Capture Stream Parameters
        let mediaRecorder = null;
        let recordedChunks = [];

        // --- CUSTOM NATIVE TOUCH SLIDER ENGINE ---
        function setupCustomSlider(container, fill, handle, bubble, min, max, initialValue, isPercentage, onChange) {
            let isDragging = false;

            function updateSliderFromCoords(clientY) {
                const rect = container.getBoundingClientRect();
                let percentage = (rect.bottom - clientY) / rect.height;
                percentage = Math.max(0, Math.min(1, percentage));

                fill.style.height = (percentage * 100) + '%';
                handle.style.bottom = (percentage * 100) + '%';

                const calculatedValue = min + percentage * (max - min);
                const displayValue = Math.round(calculatedValue);
                bubble.textContent = displayValue;
                
                onChange(calculatedValue);
            }

            const initialPercentage = (initialValue - min) / (max - min);
            fill.style.height = (initialPercentage * 100) + '%';
            handle.style.bottom = (initialPercentage * 100) + '%';
            bubble.textContent = Math.round(initialValue);

            container.addEventListener('pointerdown', (e) => {
                e.stopPropagation();
                container.setPointerCapture(e.pointerId);
                isDragging = true;
                updateSliderFromCoords(e.clientY);
            });

            container.addEventListener('pointermove', (e) => {
                if (!isDragging) return;
                e.stopPropagation();
                updateSliderFromCoords(e.clientY);
            });

            const stopDrag = (e) => {
                if (isDragging) {
                    container.releasePointerCapture(e.pointerId);
                    isDragging = false;
                }
            };

            container.addEventListener('pointerup', stopDrag);
            container.addEventListener('pointercancel', stopDrag);
        }

        setupCustomSlider(sizeSlider, sizeTrackFill, sizeHandle, sizeBubble, 1, 100, 10, false, (val) => {
            currentBrushSize = Math.round(val);
        });

        setupCustomSlider(opacSlider, opacTrackFill, opacHandle, opacBubble, 0, 100, 100, true, (val) => {
            currentOpacity = val / 100;
        });

        // Toggle Active Tools State Setup
        brushBtn.addEventListener('click', () => {
            currentTool = 'brush';
            brushBtn.classList.add('active');
            eraserBtn.classList.remove('active');
        });

        eraserBtn.addEventListener('click', () => {
            currentTool = 'eraser';
            eraserBtn.classList.add('active');
            brushBtn.classList.remove('active');
        });

        // Menu Dropdown and Panel Handling Controls
        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            colorPanel.classList.remove('show');
            menuDropdown.classList.toggle('show');
        });

        colorBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            menuDropdown.classList.remove('show');
            colorPanel.classList.toggle('show');
            if (colorPanel.classList.contains('show')) drawColorWheel();
        });

        closeColorBtn.addEventListener('click', () => {
            colorPanel.classList.remove('show');
        });

        // FIXED: Click-outside auto dismiss covers both menu and color dropdown panels correctly now
        window.addEventListener('click', (e) => {
            if (!menuDropdown.contains(e.target) && e.target !== menuBtn) menuDropdown.classList.remove('show');
            if (!colorPanel.contains(e.target) && !colorBtn.contains(e.target)) colorPanel.classList.remove('show');
        });

        // Proportional Viewport Preview Engine
        function updatePreview() {
            const w = parseInt(canvasWidthInput.value) || 1;
            const h = parseInt(canvasHeightInput.value) || 1;
            const maxDisplaySize = 150;

            if (w >= h) {
                previewBox.style.width = maxDisplaySize + 'px';
                previewBox.style.height = (h / w) * maxDisplaySize + 'px';
            } else {
                previewBox.style.height = maxDisplaySize + 'px';
                previewBox.style.width = (w / h) * maxDisplaySize + 'px';
            }
        }
        canvasWidthInput.addEventListener('input', updatePreview);
        canvasHeightInput.addEventListener('input', updatePreview);
        updatePreview();

        function applyTransforms() {
            transformContainer.style.transform = `translate(${panX}px, ${panY}px) scale(${scale}) rotate(${rotation}deg)`;
        }

        function centerCanvas() {
            panX = (window.innerWidth - canvas.width) / 2;
            panY = (window.innerHeight - canvas.height) / 2;
            scale = 1;
            rotation = 0;
            applyTransforms();
        }

        // Undo / Redo Memory Operations Stack Engine
        function saveHistoryState() {
            undoStack.push(canvas.toDataURL());
            if (undoStack.length > MAX_HISTORY) undoStack.shift();
            redoStack = []; 
            updateHistoryButtons();
        }

        function updateHistoryButtons() {
            undoBtn.disabled = undoStack.length === 0;
            redoBtn.disabled = redoStack.length === 0;
        }

        function applyHistoryState(targetStack, destinationStack) {
            if (targetStack.length === 0) return;
            
            destinationStack.push(canvas.toDataURL());
            const stateData = targetStack.pop();

            const img = new Image();
            img.onload = function() {
                ctx.save();
                ctx.globalAlpha = 1.0;
                ctx.globalCompositeOperation = 'source-over';
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
                ctx.restore();
                updateHistoryButtons();
            };
            img.src = stateData;
        }

        undoBtn.addEventListener('click', () => applyHistoryState(undoStack, redoStack));
        redoBtn.addEventListener('click', () => applyHistoryState(redoStack, undoStack));

        // --- EXPORT MENU ACTIONS LOGIC PIPELINES ---
        newFileBtn.addEventListener('click', () => {
            stopSpeedpaintRecording();
            workspace.classList.add('hidden');
            startMenu.classList.remove('hidden');
        });

        savePngBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'artwork.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });

        saveJpegBtn.addEventListener('click', () => {
            // JPEGs don't support alpha, create a proxy canvas step to assure a flattened opaque clean background
            const exportCanvas = document.createElement('canvas');
            exportCanvas.width = canvas.width;
            exportCanvas.height = canvas.height;
            const exportCtx = exportCanvas.getContext('2d');
            
            exportCtx.fillStyle = '#ffffff';
            exportCtx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);
            exportCtx.drawImage(canvas, 0, 0);

            const link = document.createElement('a');
            link.download = 'artwork.jpg';
            link.href = exportCanvas.toDataURL('image/jpeg', 0.9);
            link.click();
        });

        saveSvgBtn.addEventListener('click', () => {
            // Embed raster content directly via base64 translation wrapping container strings safely
            const svgString = `<svg xmlns="http://www.w3.org/2000/svg" width="${canvas.width}" height="${canvas.height}">
                <image width="${canvas.width}" height="${canvas.height}" href="${canvas.toDataURL('image/png')}"/>
            </svg>`;
            
            const blob = new Blob([svgString], {type: 'image/svg+xml;charset=utf-8'});
            const link = document.createElement('a');
            link.download = 'artwork.svg';
            link.href = URL.createObjectURL(blob);
            link.click();
        });

        saveSpeedpaintBtn.addEventListener('click', () => {
            stopSpeedpaintRecording();
        });

        // --- SPEEDPAINT RECORDER MANAGEMENT FUNCTIONS ---
        function startSpeedpaintRecording() {
            recordedChunks = [];
            try {
                // Capture canvas frame streams at 30FPS baseline parameters
                const stream = canvas.captureStream(30);
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
                
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data && e.data.size > 0) recordedChunks.push(e.data);
                };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.download = 'speedpaint.webm';
                    link.href = url;
                    link.click();
                    
                    // Restart immediate fresh recording thread loop sequence context backgrounds
                    startSpeedpaintRecording();
                };

                mediaRecorder.start();
            } catch (err) {
                console.warn("Speedpaint capture not supported on this browser architecture config profile setup.", err);
            }
        }

        function stopSpeedpaintRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            } else {
                alert("No active session footage found to export yet!");
            }
        }

        // Initialize Canvas Instance Configurations
        function initCanvas(width, height) {
            canvas.width = width;
            canvas.height = height;

            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            startMenu.classList.add('hidden');
            workspace.classList.remove('hidden');
            
            transformContainer.style.width = canvas.width + 'px';
            transformContainer.style.height = canvas.height + 'px';
            
            centerCanvas();
            attachDrawingListeners();
            
            undoStack = [];
            redoStack = [];
            updateHistoryButtons();

            // Kick off live background speedpaint recording session pipeline loops
            startSpeedpaintRecording();
        }

        confirmBtn.addEventListener('click', () => {
            const w = parseInt(canvasWidthInput.value) || 800;
            const h = parseInt(canvasHeightInput.value) || 600;
            initCanvas(w, h);
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    initCanvas(img.width, img.height);
                    ctx.drawImage(img, 0, 0);
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        // Color Picker Wheel Drawing Logic
        function drawColorWheel() {
            const width = colorWheel.width;
            const height = colorWheel.height;
            const cx = width / 2;
            const cy = height / 2;
            const r = width / 2;

            wheelCtx.clearRect(0,0,width,height);
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const dx = x - cx;
                    const dy = y - cy;
                    const d = Math.hypot(dx, dy);

                    if (d <= r) {
                        const angle = Math.atan2(dy, dx) + Math.PI;
                        const hue = (angle * 180) / Math.PI;
                        const sat = d / r;
                        wheelCtx.fillStyle = `hsl(${hue}, ${sat * 100}%, 50%)`;
                        wheelCtx.fillRect(x, y, 1, 1);
                    }
                }
            }
        }

        colorWheel.addEventListener('pointerdown', selectWheelColor);
        colorWheel.addEventListener('pointermove', (e) => {
            if (e.buttons === 1) selectWheelColor(e);
        });

        function selectWheelColor(e) {
            const rect = colorWheel.getBoundingClientRect();
            const x = Math.floor(e.clientX - rect.left);
            const y = Math.floor(e.clientY - rect.top);

            if(x >= 0 && x < colorWheel.width && y >= 0 && y < colorWheel.height) {
                const imgData = wheelCtx.getImageData(x, y, 1, 1).data;
                if (imgData[3] > 0) {
                    const hex = "#" + ((1 << 24) + (imgData[0] << 16) + (imgData[1] << 8) + imgData[2]).toString(16).slice(1);
                    activeColor = hex;
                    hexInput.value = hex;
                }
            }
        }

        hexInput.addEventListener('change', (e) => {
            let val = e.target.value;
            if(!val.startsWith('#')) val = '#' + val;
            if(/^#[0-9A-F]{6}$/i.test(val)) {
                activeColor = val;
            } else {
                hexInput.value = activeColor;
            }
        });

        function commitColorToPalette(hex) {
            if (recentColors[0] !== hex) {
                recentColors.unshift(hex);
                recentColors.pop();
                renderPalette();
            }
        }

        function renderPalette() {
            paletteGrid.innerHTML = '';
            recentColors.forEach(color => {
                const swatch = document.createElement('div');
                swatch.className = 'color-swatch';
                swatch.style.backgroundColor = color;
                swatch.addEventListener('click', () => {
                    activeColor = color;
                    hexInput.value = color;
                });
                paletteGrid.appendChild(swatch);
            });
        }
        renderPalette();

        /* --- DRAWING CONTROLS CORE TUNING ENGINE --- */
        function attachDrawingListeners() {
            canvas.addEventListener('pointerdown', startDrawing);
            canvas.addEventListener('pointermove', drawStroke);
            window.addEventListener('pointerup', stopDrawing);
        }

        function getCanvasCoordinates(e) {
            const rect = transformContainer.getBoundingClientRect();
            const rad = (-rotation * Math.PI) / 180;
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            
            const xRot = (e.clientX - cx) * Math.cos(rad) - (e.clientY - cy) * Math.sin(rad);
            const yRot = (e.clientX - cx) * Math.sin(rad) + (e.clientY - cy) * Math.cos(rad);
            
            return {
                x: xRot / scale + canvas.width / 2,
                y: yRot / scale + canvas.height / 2
            };
        }

        function startDrawing(e) {
            if (activePointers.length > 0) return; 
            
            saveHistoryState(); 
            drawing = true;
            strokeHasPainted = false; 

            const coords = getCanvasCoordinates(e);
            ctx.beginPath();
            ctx.moveTo(coords.x, coords.y);
            drawStroke(e);
        }

        function drawStroke(e) {
            if (!drawing) return;
            strokeHasPainted = true;

            const coords = getCanvasCoordinates(e);
            
            ctx.save();
            ctx.lineWidth = currentBrushSize;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.globalAlpha = currentOpacity;

            // Compute composite modes matching active instrument selection targets
            if (currentTool === 'eraser') {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.strokeStyle = 'rgba(0,0,0,1.0)';
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = activeColor;
            }

            ctx.lineTo(coords.x, coords.y);
            ctx.stroke();
            ctx.restore();
            
            ctx.beginPath();
            ctx.moveTo(coords.x, coords.y);
        }

        function stopDrawing() {
            if (drawing) {
                drawing = false;
                ctx.beginPath();
                // Commit color historical data updates strictly matching drawing validations
                if (strokeHasPainted && currentTool === 'brush') {
                    commitColorToPalette(activeColor);
                }
            }
        }

        /* --- STABILIZED STROKE LOCK GESTURE ENGINE --- */
        let activePointers = [];
        let startPanX = 0, startPanY = 0;
        let initialTouchDist = 0;
        let initialTouchAngle = 0;
        let initialScale = 1;
        let initialRotation = 0;
        let isPanning = false;

        function getDistance(p1, p2) {
            return Math.hypot(p2.clientX - p1.clientX, p2.clientY - p1.clientY);
        }

        function getAngle(p1, p2) {
            return Math.atan2(p2.clientY - p1.clientY, p2.clientX - p1.clientX) * 180 / Math.PI;
        }

        workspace.addEventListener('pointerdown', (e) => {
            if (e.target.closest('.top-bar') || e.target.closest('.left-controls') || e.target.closest('.color-panel')) return;
            if (e.target === canvas) return;

            activePointers.push(e);
            
            if (activePointers.length === 1) {
                isPanning = true;
                startPanX = e.clientX - panX;
                startPanY = e.clientY - panY;
            } else if (activePointers.length === 2) {
                isPanning = false;
                initialTouchDist = getDistance(activePointers[0], activePointers[1]);
                initialTouchAngle = getAngle(activePointers[0], activePointers[1]);
                initialScale = scale;
                initialRotation = rotation;
                
                startPanX = ((activePointers[0].clientX + activePointers[1].clientX) / 2) - panX;
                startPanY = ((activePointers[0].clientY + activePointers[1].clientY) / 2) - panY;
            }
        });

        workspace.addEventListener('pointermove', (e) => {
            const index = activePointers.findIndex(p => p.pointerId === e.pointerId);
            if (index !== -1) activePointers[index] = e;

            if (isPanning && activePointers.length === 1) {
                panX = e.clientX - startPanX;
                panY = e.clientY - startPanY;
                applyTransforms();
            } else if (activePointers.length === 2) {
                const currentDist = getDistance(activePointers[0], activePointers[1]);
                const currentAngle = getAngle(activePointers[0], activePointers[1]);

                let targetScale = initialScale * (currentDist / initialTouchDist);
                scale = Math.max(0.1, Math.min(targetScale, 10));
                
                rotation = initialRotation + (currentAngle - initialTouchAngle);
                applyTransforms();
            }
        });

        function handlePointerUp(e) {
            activePointers = activePointers.filter(p => p.pointerId !== e.pointerId);
            if (activePointers.length < 2) {
                initialTouchDist = 0;
                initialTouchAngle = 0;
            }
            if (activePointers.length === 0) {
                isPanning = false;
            }
        }

        workspace.addEventListener('pointerup', handlePointerUp);
        workspace.addEventListener('pointercancel', handlePointerUp);

        workspace.addEventListener('wheel', (e) => {
            if (e.target.closest('.top-bar') || e.target.closest('.left-controls') || e.target.closest('.color-panel')) return;
            e.preventDefault();
            const zoomFactor = 1.1;
            let targetScale = scale;
            
            if (e.deltaY < 0) {
                targetScale *= zoomFactor;
            } else {
                targetScale /= zoomFactor;
            }
            
            scale = Math.max(0.1, Math.min(targetScale, 10));
            applyTransforms();
        }, { passive: false });

    </script>
</body>
</html>
