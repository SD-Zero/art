<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Art Program</title>
    <style>
        /* Base page alignment */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: sans-serif;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Screen Toggling */
        .hidden {
            display: none !important;
        }

        /* Start Menu Box */
        .menu-container {
            background-color: #262626;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            width: 350px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            z-index: 200;
        }

        /* Logo Text Placeholder */
        .logo-text {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 25px;
            color: #007acc;
        }

        /* Size Inputs Layout */
        .input-group {
            margin: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .input-group input {
            width: 100px;
            padding: 5px;
            text-align: center;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
        }

        /* Proportional Preview Box */
        .preview-box {
            margin: 20px auto;
            border: 1px solid #ffffff;
            background-color: #ffffff;
            max-width: 150px;
            max-height: 150px;
        }

        /* Action Buttons */
        .confirm-btn {
            background-color: #007acc;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .file-label {
            display: block;
            background-color: #444;
            color: white;
            padding: 10px 20px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            border: 1px dashed #666;
        }

        .file-label:hover {
            background-color: #555;
        }

        #fileInput {
            display: none;
        }

        /* ART WORKSPACE */
        .workspace {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #1e1e1e;
            touch-action: none;
        }

        /* Viewport container for transforms */
        .transform-container {
            position: absolute;
            transform-origin: center center;
            display: inline-block;
        }

        canvas {
            background-color: #ffffff;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
            border: 1px solid #2d2d2d;
            display: block;
        }

        /* --- TOP BAR UI --- */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 45px;
            background-color: #121212;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 0 15px;
            box-sizing: border-box;
            z-index: 100;
        }

        .icon-btn {
            background: none;
            border: none;
            color: #cccccc;
            padding: 6px 10px;
            margin-right: 10px;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover, .icon-btn.active {
            background-color: #222222;
            color: #ffffff;
        }

        .icon-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* Dropdown Menu Styling */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: 40px;
            left: 0;
            background-color: #1c1c1c;
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5);
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            z-index: 150;
        }

        .dropdown-content a {
            color: #e0e0e0;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-size: 14px;
        }

        .dropdown-content a:hover {
            background-color: #2a2a2a;
            color: #ffffff;
        }

        /* --- NEW COLOR DROPDOWN PANEL UI --- */
        .color-panel {
            display: none;
            position: absolute;
            top: 55px;
            left: 60px;
            background-color: #1c1c1c;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 15px;
            width: 240px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            z-index: 150;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .panel-title {
            font-size: 13px;
            font-weight: bold;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .close-panel-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 18px;
            cursor: pointer;
            padding: 0 5px;
        }

        .close-panel-btn:hover {
            color: #fff;
        }

        .color-wheel-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 12px;
        }

        #colorWheel {
            cursor: crosshair;
            border-radius: 50%;
        }

        .hex-input-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #2a2a2a;
            padding: 5px 10px;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .hex-input-group label {
            font-size: 12px;
            color: #888;
        }

        .hex-input-group input {
            background: none;
            border: none;
            color: #fff;
            width: 80px;
            text-align: right;
            font-family: monospace;
            font-size: 14px;
            outline: none;
        }

        .palette-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            max-height: 100px;
            overflow-y: auto;
        }

        .color-swatch {
            width: 100%;
            padding-top: 100%; /* Keeps swatches perfectly square */
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
            box-sizing: border-box;
        }

        .color-swatch:hover {
            transform: scale(1.05);
        }

        .show {
            display: block !important;
        }

        /* --- LEFT SIDE SLIDERS UI --- */
        .left-controls {
            position: absolute;
            left: 20px;
            top: 80px;
            display: flex;
            flex-direction: column;
            gap: 40px;
            z-index: 10;
            background: rgba(18, 18, 18, 0.4);
            padding: 15px 10px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .slider-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 40px;
        }

        .slider-label {
            font-size: 11px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .vertical-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 6px;
            height: 150px;
            background: #444;
            border-radius: 3px;
            outline: none;
            transform: rotate(-180deg); 
            direction: rtl; 
            margin: 0;
            padding: 0;
        }

        .vertical-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            position: relative;
            margin-top: 0px; 
        }

        .vertical-slider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            border: none;
        }
    </style>
</head>
<body>

    <div id="startMenu" class="menu-container">
        <div class="logo-text">(insertlogohere)</div>
        
        <h2>Create New Canvas</h2>
        
        <div class="input-group">
            <label for="canvasWidth">Width (PX):</label>
            <input type="number" id="canvasWidth" value="800" min="1">
        </div>
        
        <div class="input-group">
            <label for="canvasHeight">Height (PX):</label>
            <input type="number" id="canvasHeight" value="600" min="1">
        </div>

        <p style="font-size: 14px; color: #aaa; margin-bottom: 5px;">Preview:</p>
        <div id="previewBox" class="preview-box"></div>
        
        <button id="confirmBtn" class="confirm-btn">Confirm</button>
        
        <label for="fileInput" class="file-label">Load from File</label>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <div id="workspace" class="workspace hidden">
        
        <div class="top-bar">
            <div class="dropdown">
                <button id="menuBtn" class="icon-btn" title="Menu">
                    <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
                </button>
                <div id="menuDropdown" class="dropdown-content">
                    <a href="#" id="placeholder1">Placeholder Opt 1</a>
                    <a href="#" id="placeholder2">Placeholder Opt 2</a>
                    <a href="#" id="placeholder3">Placeholder Opt 3</a>
                </div>
            </div>
            
            <button class="icon-btn" id="colorBtn" title="Color">
                <svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 0 0 0 18c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01a1.49 1.49 0 0 1-.22-.84c0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zm-5.5 9a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm3-3a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm4.5 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm3 3a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z"/></svg>
            </button>
            
            <button class="icon-btn" id="brushBtn" title="Brush">
                <svg viewBox="0 0 24 24"><path d="M7 14c-1.66 0-3 1.34-3 3 0 1.31-1.16 2-2 2 .92.62 2.1 1 3.5 1 2.5 0 4.5-2 4.5-4.5 0-.41-.15-.77-.32-1.15l-1.35-2.7L7 14zm14.37-9c.39-.39.39-1.02 0-1.41L19.41.63a.996.996 0 0 0-1.41 0L6.67 11.96l2.37 2.37L21.37 5z"/></svg>
            </button>
            
            <button class="icon-btn" id="transformBtn" title="Transform">
                <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4H9V2H2v7h2V5.41l5.17 5.17 1.42-1.41zM14.5 4l5.17 5.17 1.42-1.41L15.91 4H19V2h-7v7h2V5.41zm-5.33 10.59L4 19.76V16H2v7h7v-2H5.41l5.17-5.17-1.41-1.42zM14.5 14.5l1.41-1.42L21 18.24V15h2v7h-7v-2h3.59l-5.1-5.1z"/></svg>
            </button>
            
            <button class="icon-btn" id="lassoBtn" title="Lasso">
                <svg viewBox="0 0 24 24"><path d="M18.06 13.04c.33-.8.44-1.67.31-2.54A5.942 5.942 0 0 0 13 5.06c-.87-.13-1.74-.02-2.54.31L4.63 2.13 3.37 3.63l5.59 3.19C8.36 7.82 8 8.87 8 10c0 2.76 2.24 5 5 5 .13 0 .26-.01.39-.02l2.37 4.15c-.49.19-.88.56-1.08 1.05-.4.93-.05 2.01.81 2.5a1.99 1.99 0 0 0 2.69-.81c.42-.93.02-2.02-.85-2.5l-2.31-4.04c1.17-.41 2.15-1.21 2.84-2.29l2.76 1.58 1.01-1.73-2.58-1.48zm-5.06.46c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg>
            </button>
        </div>

        <div id="colorPanel" class="color-panel">
            <div class="panel-header">
                <span class="panel-title">Colors</span>
                <button id="closeColorBtn" class="close-panel-btn">&times;</button>
            </div>
            <div class="color-wheel-wrapper">
                <canvas id="colorWheel" width="180" height="180"></canvas>
            </div>
            <div class="hex-input-group">
                <label for="hexInput">HEX</label>
                <input type="text" id="hexInput" value="#000000" maxlength="7">
            </div>
            <div id="paletteGrid" class="palette-grid"></div>
        </div>

        <div class="left-controls">
            <div class="slider-wrapper">
                <span class="slider-label">Size</span>
                <input type="range" id="brushSize" class="vertical-slider" min="1" max="100" value="10">
            </div>
            <div class="slider-wrapper">
                <span class="slider-label">Opac</span>
                <input type="range" id="brushOpacity" class="vertical-slider" min="0" max="100" value="100">
            </div>
        </div>

        <div id="transformContainer" class="transform-container">
            <canvas id="paintCanvas"></canvas>
        </div>
    </div>

    <script>
        // Menu Elements
        const startMenu = document.getElementById('startMenu');
        const canvasWidthInput = document.getElementById('canvasWidth');
        const canvasHeightInput = document.getElementById('canvasHeight');
        const previewBox = document.getElementById('previewBox');
        const confirmBtn = document.getElementById('confirmBtn');
        const fileInput = document.getElementById('fileInput');

        // Workspace Elements
        const workspace = document.getElementById('workspace');
        const transformContainer = document.getElementById('transformContainer');
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');

        // Brush Settings Sliders
        const brushSizeSlider = document.getElementById('brushSize');
        const brushOpacitySlider = document.getElementById('brushOpacity');

        // UI Element Connectors
        const menuBtn = document.getElementById('menuBtn');
        const menuDropdown = document.getElementById('menuDropdown');
        const colorBtn = document.getElementById('colorBtn');
        const colorPanel = document.getElementById('colorPanel');
        const closeColorBtn = document.getElementById('closeColorBtn');
        const hexInput = document.getElementById('hexInput');
        const paletteGrid = document.getElementById('paletteGrid');
        const colorWheel = document.getElementById('colorWheel');
        const wheelCtx = colorWheel.getContext('2d');

        // State variables for Viewport manipulation (Pan, Zoom, Rotate)
        let scale = 1;
        let panX = 0;
        let panY = 0;
        let rotation = 0; 

        // State variables for Active Drawing Engine
        let drawing = false;
        let currentBrushSize = 10;
        let currentOpacity = 1.0;
        let activeColor = '#000000';
        
        // 20 Palette slots initialization history data track
        let recentColors = Array(20).fill('#ffffff');

        // Connect functional brush sliders directly to draw logic state
        brushSizeSlider.addEventListener('input', (e) => {
            currentBrushSize = parseInt(e.target.value);
        });

        brushOpacitySlider.addEventListener('input', (e) => {
            currentOpacity = parseInt(e.target.value) / 100;
        });

        // Topbar UI Toggle Menus Logic
        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            colorPanel.classList.remove('show');
            menuDropdown.classList.toggle('show');
        });

        colorBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            menuDropdown.classList.remove('show');
            colorPanel.classList.toggle('show');
            if (colorPanel.classList.contains('show')) drawColorWheel();
        });

        closeColorBtn.addEventListener('click', () => {
            colorPanel.classList.remove('show');
        });

        // Global dismiss handler windows triggers
        window.addEventListener('click', (e) => {
            if (!menuDropdown.contains(e.target) && e.target !== menuBtn) {
                menuDropdown.classList.remove('show');
            }
            if (!colorPanel.contains(e.target) && !colorBtn.contains(e.target)) {
                colorPanel.classList.remove('show');
            }
        });

        // Generate standard color wheel image layout inside target sub-canvas
        function drawColorWheel() {
            const width = colorWheel.width;
            const height = colorWheel.height;
            const cx = width / 2;
            const cy = height / 2;
            const r = width / 2;

            wheelCtx.clearRect(0,0,width,height);

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const dx = x - cx;
                    const dy = y - cy;
                    const d = Math.hypot(dx, dy);

                    if (d <= r) {
                        const angle = Math.atan2(dy, dx) + Math.PI; // 0 to 2PI
                        const hue = (angle * 180) / Math.PI;
                        const sat = d / r;
                        wheelCtx.fillStyle = `hsl(${hue}, ${sat * 100}%, 50%)`;
                        wheelCtx.fillRect(x, y, 1, 1);
                    }
                }
            }
        }

        // Color wheel click interaction handler code tracking
        colorWheel.addEventListener('pointerdown', selectWheelColor);
        colorWheel.addEventListener('pointermove', (e) => {
            if (e.buttons === 1) selectWheelColor(e);
        });

        function selectWheelColor(e) {
            const rect = colorWheel.getBoundingClientRect();
            const x = Math.floor(e.clientX - rect.left);
            const y = Math.floor(e.clientY - rect.top);

            if(x >= 0 && x < colorWheel.width && y >= 0 && y < colorWheel.height) {
                const imgData = wheelCtx.getImageData(x, y, 1, 1).data;
                if (imgData[3] > 0) { // If pixel isn't transparent edge
                    const hex = "#" + ((1 << 24) + (imgData[0] << 16) + (imgData[1] << 8) + imgData[2]).toString(16).slice(1);
                    updateActiveColor(hex);
                }
            }
        }

        // Hex manual string input data field tracker
        hexInput.addEventListener('change', (e) => {
            let val = e.target.value;
            if(!val.startsWith('#')) val = '#' + val;
            // Validate hex regex sequence check matching specifications
            if(/^#[0-9A-F]{6}$/i.test(val)) {
                updateActiveColor(val);
            } else {
                hexInput.value = activeColor;
            }
        });

        function updateActiveColor(hex) {
            activeColor = hex;
            hexInput.value = hex;
            
            // Add to recents array tracker list if it isn't already the most recent slot item
            if (recentColors[0] !== hex) {
                recentColors.unshift(hex);
                recentColors.pop(); // Maintain locked 20 length items limit count boundary
                renderPalette();
            }
        }

        function renderPalette() {
            paletteGrid.innerHTML = '';
            recentColors.forEach(color => {
                const swatch = document.createElement('div');
                swatch.className = 'color-swatch';
                swatch.style.backgroundColor = color;
                swatch.addEventListener('click', () => {
                    activeColor = color;
                    hexInput.value = color;
                });
                paletteGrid.appendChild(swatch);
            });
        }

        // Initialize grid render tracking slots immediately
        renderPalette();

        // Track pointer states for multi-touch gestures
        let activePointers = [];
        let startPanX = 0, startPanY = 0;
        let initialTouchDist = 0;
        let initialTouchAngle = 0;
        let initialScale = 1;
        let initialRotation = 0;
        let isPanning = false;

        // Function to update the preview box proportions
        function updatePreview() {
            const w = parseInt(canvasWidthInput.value) || 1;
            const h = parseInt(canvasHeightInput.value) || 1;
            const maxDisplaySize = 150;

            if (w >= h) {
                previewBox.style.width = maxDisplaySize + 'px';
                previewBox.style.height = (h / w) * maxDisplaySize + 'px';
            } else {
                previewBox.style.height = maxDisplaySize + 'px';
                previewBox.style.width = (w / h) * maxDisplaySize + 'px';
            }
        }

        canvasWidthInput.addEventListener('input', updatePreview);
        canvasHeightInput.addEventListener('input', updatePreview);
        updatePreview();

        // Update CSS Transforms safely
        function applyTransforms() {
            transformContainer.style.transform = `translate(${panX}px, ${panY}px) scale(${scale}) rotate(${rotation}deg)`;
        }

        // Center the canvas precisely in the middle of the workspace screen
        function centerCanvas() {
            panX = (window.innerWidth - canvas.width) / 2;
            panY = (window.innerHeight - canvas.height) / 2;
            scale = 1;
            rotation = 0;
            applyTransforms();
        }

        // Initialize Canvas View State
        function initCanvas(width, height) {
            canvas.width = width;
            canvas.height = height;

            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            startMenu.classList.add('hidden');
            workspace.classList.remove('hidden');
            
            transformContainer.style.width = canvas.width + 'px';
            transformContainer.style.height = canvas.height + 'px';
            
            centerCanvas();
            attachDrawingListeners();
        }

        // Confirm Dimensions Action
        confirmBtn.addEventListener('click', () => {
            const w = parseInt(canvasWidthInput.value) || 800;
            const h = parseInt(canvasHeightInput.value) || 600;
            initCanvas(w, h);
        });

        // Load from File Action
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    initCanvas(img.width, img.height);
                    ctx.drawImage(img, 0, 0);
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        /* DRAWING ENGINE LOGIC */
        function attachDrawingListeners() {
            canvas.addEventListener('pointerdown', startDrawing);
            canvas.addEventListener('pointermove', drawStroke);
            window.addEventListener('pointerup', stopDrawing);
        }

        function getCanvasCoordinates(e) {
            const rect = transformContainer.getBoundingClientRect();
            const rad = (-rotation * Math.PI) / 180;
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            
            const xRot = (e.clientX - cx) * Math.cos(rad) - (e.clientY - cy) * Math.sin(rad);
            const yRot = (e.clientX - cx) * Math.sin(rad) + (e.clientY - cy) * Math.cos(rad);
            
            return {
                x: xRot / scale + canvas.width / 2,
                y: yRot / scale + canvas.height / 2
            };
        }

        function startDrawing(e) {
            if (activePointers.length > 0) return; 
            drawing = true;
            const coords = getCanvasCoordinates(e);
            ctx.beginPath();
            ctx.moveTo(coords.x, coords.y);
            drawStroke(e);
        }

        function drawStroke(e) {
            if (!drawing) return;
            const coords = getCanvasCoordinates(e);

            ctx.lineWidth = currentBrushSize;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            ctx.strokeStyle = activeColor;
            ctx.globalAlpha = currentOpacity;

            ctx.lineTo(coords.x, coords.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(coords.x, coords.y);
        }

        function stopDrawing() {
            if (drawing) {
                drawing = false;
                ctx.beginPath();
            }
        }

        /* DESKTOP MOUSE / MOBILE GESTURE ENGINE FOR PAN, ZOOM, ROTATE */
        workspace.addEventListener('pointerdown', (e) => {
            // Block viewport changes if directly interacting with topbar panels or left sliders
            if (e.target.closest('.top-bar') || e.target.closest('.left-controls') || e.target.closest('.color-panel')) return;
            if (e.target === canvas && !drawing && activePointers.length === 0) return;

            activePointers.push(e);
            
            if (activePointers.length === 1) {
                isPanning = true;
                startPanX = e.clientX - panX;
                startPanY = e.clientY - panY;
            } else if (activePointers.length === 2) {
                isPanning = false;
                drawing = false; 
                initialTouchDist = getDistance(activePointers[0], activePointers[1]);
                initialTouchAngle = getAngle(activePointers[0], activePointers[1]);
                initialScale = scale;
                initialRotation = rotation;
                
                startPanX = ((activePointers[0].clientX + activePointers[1].clientX) / 2) - panX;
                startPanY = ((activePointers[0].clientY + activePointers[1].clientY) / 2) - panY;
            }
        });

        workspace.addEventListener('pointermove', (e) => {
            const index = activePointers.findIndex(p => p.pointerId === e.pointerId);
            if (index !== -1) activePointers[index] = e;

            if (isPanning && activePointers.length === 1) {
                panX = e.clientX - startPanX;
                panY = e.clientY - startPanY;
                applyTransforms();
            } else if (activePointers.length === 2) {
                const currentDist = getDistance(activePointers[0], activePointers[1]);
                const currentAngle = getAngle(activePointers[0], activePointers[1]);

                let targetScale = initialScale * (currentDist / initialTouchDist);
                scale = Math.max(0.1, Math.min(targetScale, 10));
                
                rotation = initialRotation + (currentAngle - initialTouchAngle);
                applyTransforms();
            }
        });

        function handlePointerUp(e) {
            activePointers = activePointers.filter(p => p.pointerId !== e.pointerId);
            if (activePointers.length < 2) {
                initialTouchDist = 0;
                initialTouchAngle = 0;
            }
            if (activePointers.length === 0) {
                isPanning = false;
            }
        }

        workspace.addEventListener('pointerup', handlePointerUp);
        workspace.addEventListener('pointercancel', handlePointerUp);

        workspace.addEventListener('wheel', (e) => {
            if (e.target.closest('.top-bar') || e.target.closest('.left-controls') || e.target.closest('.color-panel')) return;
            e.preventDefault();
            const zoomFactor = 1.1;
            let targetScale = scale;
            
            if (e.deltaY < 0) {
                targetScale *= zoomFactor;
            } else {
                targetScale /= zoomFactor;
            }
            
            scale = Math.max(0.1, Math.min(targetScale, 10));
            applyTransforms();
        }, { passive: false });

    </script>
</body>
</html>
