<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Art Program</title>
    <style>
        /* Base page alignment */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: sans-serif;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Screen Toggling */
        .hidden {
            display: none !important;
        }

        /* Start Menu Box */
        .menu-container {
            background-color: #262626;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            width: 350px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            z-index: 100;
        }

        /* Logo Text Placeholder */
        .logo-text {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 25px;
            color: #007acc;
        }

        /* Size Inputs Layout */
        .input-group {
            margin: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .input-group input {
            width: 100px;
            padding: 5px;
            text-align: center;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
        }

        /* Proportional Preview Box */
        .preview-box {
            margin: 20px auto;
            border: 1px solid #ffffff;
            background-color: #ffffff;
            max-width: 150px;
            max-height: 150px;
        }

        /* Action Buttons */
        .confirm-btn {
            background-color: #007acc;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .file-label {
            display: block;
            background-color: #444;
            color: white;
            padding: 10px 20px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            border: 1px dashed #666;
        }

        .file-label:hover {
            background-color: #555;
        }

        #fileInput {
            display: none;
        }

        /* ART WORKSPACE (Procreate-style Slate Dark Gray) */
        .workspace {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #1e1e1e;
            touch-action: none;
        }

        /* Viewport tracking container for PAN/ZOOM/ROTATE transforms */
        .transform-container {
            position: absolute;
            transform-origin: center center;
            display: inline-block;
        }

        canvas {
            background-color: #ffffff;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
            border: 1px solid #2d2d2d;
            display: block;
        }

        /* --- NEW TOP BAR UI --- */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 45px;
            background-color: #121212;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 0 15px;
            box-sizing: border-box;
            z-index: 50;
        }

        .icon-btn {
            background: none;
            border: none;
            color: #cccccc;
            font-size: 14px;
            font-weight: 600;
            padding: 8px 12px;
            margin-right: 10px;
            cursor: pointer;
            border-radius: 4px;
        }

        .icon-btn:hover {
            background-color: #222222;
            color: #ffffff;
        }

        /* Dropdown Menu Styling */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: 45px;
            left: 0;
            background-color: #1c1c1c;
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5);
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            z-index: 60;
        }

        .dropdown-content a {
            color: #e0e0e0;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-size: 14px;
        }

        .dropdown-content a:hover {
            background-color: #2a2a2a;
            color: #ffffff;
        }

        .show {
            display: block !important;
        }

        /* --- NEW LEFT SIDE SLIDERS UI --- */
        .left-controls {
            position: absolute;
            left: 20px;
            top: 80px;
            display: flex;
            flex-direction: column;
            gap: 40px;
            z-index: 50;
            background: rgba(18, 18, 18, 0.4);
            padding: 15px 10px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        .slider-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .slider-label {
            font-size: 11px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Turning standard sliders vertical */
        .vertical-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 6px;
            height: 150px;
            background: #444;
            border-radius: 3px;
            outline: none;
            writing-mode: bt-lr; /* IE support */
            transform: rotate(-180deg); /* Flip it so up increases value */
            direction: rtl; /* Standard orientation fix for slider track direction */
        }

        /* Slider Thumb Styling */
        .vertical-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
        }

        .vertical-slider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            border: none;
        }
    </style>
</head>
<body>

    <div id="startMenu" class="menu-container">
        <div class="logo-text">(insertlogohere)</div>
        
        <h2>Create New Canvas</h2>
        
        <div class="input-group">
            <label for="canvasWidth">Width (PX):</label>
            <input type="number" id="canvasWidth" value="800" min="1">
        </div>
        
        <div class="input-group">
            <label for="canvasHeight">Height (PX):</label>
            <input type="number" id="canvasHeight" value="600" min="1">
        </div>

        <p style="font-size: 14px; color: #aaa; margin-bottom: 5px;">Preview:</p>
        <div id="previewBox" class="preview-box"></div>
        
        <button id="confirmBtn" class="confirm-btn">Confirm</button>
        
        <label for="fileInput" class="file-label">Load from File</label>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <div id="workspace" class="workspace hidden">
        
        <div class="top-bar">
            <div class="dropdown">
                <button id="menuBtn" class="icon-btn">☰ Menu</button>
                <div id="menuDropdown" class="dropdown-content">
                    <a href="#" id="placeholder1">Placeholder Opt 1</a>
                    <a href="#" id="placeholder2">Placeholder Opt 2</a>
                    <a href="#" id="placeholder3">Placeholder Opt 3</a>
                </div>
            </div>
            <button class="icon-btn" id="colorBtn">🎨 Color</button>
            <button class="icon-btn" id="brushBtn">🖌️ Brush</button>
            <button class="icon-btn" id="transformBtn">⤢ Transform</button>
            <button class="icon-btn" id="lassoBtn">⬡ Lasso</button>
        </div>

        <div class="left-controls">
            <div class="slider-wrapper">
                <span class="slider-label">Size</span>
                <input type="range" id="brushSize" class="vertical-slider" min="1" max="100" value="10">
            </div>
            <div class="slider-wrapper">
                <span class="slider-label">Opac</span>
                <input type="range" id="brushOpacity" class="vertical-slider" min="0" max="100" value="100">
            </div>
        </div>

        <div id="transformContainer" class="transform-container">
            <canvas id="paintCanvas"></canvas>
        </div>
    </div>

    <script>
        // Menu Elements
        const startMenu = document.getElementById('startMenu');
        const canvasWidthInput = document.getElementById('canvasWidth');
        const canvasHeightInput = document.getElementById('canvasHeight');
        const previewBox = document.getElementById('previewBox');
        const confirmBtn = document.getElementById('confirmBtn');
        const fileInput = document.getElementById('fileInput');

        // Workspace Elements
        const workspace = document.getElementById('workspace');
        const transformContainer = document.getElementById('transformContainer');
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');

        // UI Top Bar Dropdown Trigger Logic
        const menuBtn = document.getElementById('menuBtn');
        const menuDropdown = document.getElementById('menuDropdown');

        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            menuDropdown.classList.toggle('show');
        });

        // Close dropdown when clicking outside of it
        window.addEventListener('click', () => {
            if (menuDropdown.classList.contains('show')) {
                menuDropdown.classList.remove('show');
            }
        });

        // State variables for Viewport manipulation (Pan, Zoom, Rotate)
        let scale = 1;
        let panX = 0;
        let panY = 0;
        let rotation = 0; 

        // Track pointer states for multi-touch gestures
        let activePointers = [];
        let startPanX = 0, startPanY = 0;
        let initialTouchDist = 0;
        let initialTouchAngle = 0;
        let initialScale = 1;
        let initialRotation = 0;
        let isPanning = false;

        // Function to update the preview box proportions
        function updatePreview() {
            const w = parseInt(canvasWidthInput.value) || 1;
            const h = parseInt(canvasHeightInput.value) || 1;
            const maxDisplaySize = 150;

            if (w >= h) {
                previewBox.style.width = maxDisplaySize + 'px';
                previewBox.style.height = (h / w) * maxDisplaySize + 'px';
            } else {
                previewBox.style.height = maxDisplaySize + 'px';
                previewBox.style.width = (w / h) * maxDisplaySize + 'px';
            }
        }

        canvasWidthInput.addEventListener('input', updatePreview);
        canvasHeightInput.addEventListener('input', updatePreview);
        updatePreview();

        // Update CSS Transforms safely
        function applyTransforms() {
            transformContainer.style.transform = `translate(${panX}px, ${panY}px) scale(${scale}) rotate(${rotation}deg)`;
        }

        // Center the canvas precisely in the middle of the workspace screen
        function centerCanvas() {
            panX = (window.innerWidth - canvas.width) / 2;
            panY = (window.innerHeight - canvas.height) / 2;
            scale = 1;
            rotation = 0;
            applyTransforms();
        }

        // Initialize Canvas View State
        function initCanvas(width, height) {
            canvas.width = width;
            canvas.height = height;

            // Start canvas with a clean white backing array
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            startMenu.classList.add('hidden');
            workspace.classList.remove('hidden');
            
            // Set explicit transform sizes matching canvas specs to stabilize pivot math
            transformContainer.style.width = canvas.width + 'px';
            transformContainer.style.height = canvas.height + 'px';
            
            centerCanvas();
        }

        // Confirm Dimensions Action
        confirmBtn.addEventListener('click', () => {
            const w = parseInt(canvasWidthInput.value) || 800;
            const h = parseInt(canvasHeightInput.value) || 600;
            initCanvas(w, h);
        });

        // Load from File Action
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    initCanvas(img.width, img.height);
                    ctx.drawImage(img, 0, 0);
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        /* DESKTOP MOUSE / MOBILE GESTURE ENGINE FOR PAN, ZOOM, ROTATE */
        
        function getDistance(p1, p2) {
            return Math.hypot(p2.clientX - p1.clientX, p2.clientY - p1.clientY);
        }

        function getAngle(p1, p2) {
            return Math.atan2(p2.clientY - p1.clientY, p2.clientX - p1.clientX) * 180 / Math.PI;
        }

        workspace.addEventListener('pointerdown', (e) => {
            // Prevent workspace panning interactions if clicking top-bar or slider controls
            if (e.target.closest('.top-bar') || e.target.closest('.left-controls')) return;

            activePointers.push(e);
            
            if (activePointers.length === 1) {
                isPanning = true;
                startPanX = e.clientX - panX;
                startPanY = e.clientY - panY;
            } else if (activePointers.length === 2) {
                isPanning = false;
                initialTouchDist = getDistance(activePointers[0], activePointers[1]);
                initialTouchAngle = getAngle(activePointers[0], activePointers[1]);
                initialScale = scale;
                initialRotation = rotation;
                
                startPanX = ((activePointers[0].clientX + activePointers[1].clientX) / 2) - panX;
                startPanY = ((activePointers[0].clientY + activePointers[1].clientY) / 2) - panY;
            }
        });

        workspace.addEventListener('pointermove', (e) => {
            const index = activePointers.findIndex(p => p.pointerId === e.pointerId);
            if (index !== -1) activePointers[index] = e;

            if (isPanning && activePointers.length === 1) {
                panX = e.clientX - startPanX;
                panY = e.clientY - startPanY;
                applyTransforms();
            } else if (activePointers.length === 2) {
                const currentDist = getDistance(activePointers[0], activePointers[1]);
                const currentAngle = getAngle(activePointers[0], activePointers[1]);

                let targetScale = initialScale * (currentDist / initialTouchDist);
                scale = Math.max(0.1, Math.min(targetScale, 10));
                
                rotation = initialRotation + (currentAngle - initialTouchAngle);
                applyTransforms();
            }
        });

        function handlePointerUp(e) {
            activePointers = activePointers.filter(p => p.pointerId !== e.pointerId);
            if (activePointers.length < 2) {
                initialTouchDist = 0;
                initialTouchAngle = 0;
            }
            if (activePointers.length === 0) {
                isPanning = false;
            }
        }

        workspace.addEventListener('pointerup', handlePointerUp);
        workspace.addEventListener('pointercancel', handlePointerUp);

        // Desktop Mouse Wheel Zoom Support (Stabilized)
        workspace.addEventListener('wheel', (e) => {
            if (e.target.closest('.top-bar') || e.target.closest('.left-controls')) return;
            e.preventDefault();
            const zoomFactor = 1.1;
            let targetScale = scale;
            
            if (e.deltaY < 0) {
                targetScale *= zoomFactor;
            } else {
                targetScale /= zoomFactor;
            }
            
            scale = Math.max(0.1, Math.min(targetScale, 10));
            applyTransforms();
        }, { passive: false });

    </script>
</body>
</html>
