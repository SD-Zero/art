<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Art App</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: white; }
        canvas { background: white; border: 2px solid #fff; cursor: crosshair; }
        .controls { margin: 10px; }
    </style>
</head>
<body>

    <h1>My Art Studio</h1>
    <div class="controls">
        <input type="color" id="colorPicker" value="#000000">
        <input type="range" id="brushSize" min="1" max="50" value="5">
        <button id="clearBtn">Clear</button>
        <button id="saveBtn">Save Image</button>
    </div>
    
    <canvas id="paintCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const brushSize = document.getElementById('brushSize');
        const clearBtn = document.getElementById('clearBtn');
        const saveBtn = document.getElementById('saveBtn');

        let drawing = false;

        // Start drawing
        canvas.addEventListener('mousedown', () => drawing = true);
        canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
        canvas.addEventListener('mousemove', draw);

        function draw(e) {
            if (!drawing) return;
            
            // Get correct mouse position relative to canvas
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            ctx.lineWidth = brushSize.value;
            ctx.lineCap = 'round';
            ctx.strokeStyle = colorPicker.value;

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        // Clear Canvas
        clearBtn.addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        // Save to Device
        saveBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'my-artwork.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    </script>
</body>
</html>
