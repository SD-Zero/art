<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Art Program</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="startMenu" class="menu-container">
        <div class="logo-text">(insertlogohere)</div>
        <h2>Create New Canvas</h2>
        
        <div class="input-group">
            <label for="canvasWidth">Width (PX):</label>
            <input type="number" id="canvasWidth" value="800" min="1">
        </div>
        
        <div class="input-group">
            <label for="canvasHeight">Height (PX):</label>
            <input type="number" id="canvasHeight" value="600" min="1">
        </div>

        <p style="font-size: 14px; color: #aaa; margin-bottom: 5px;">Preview:</p>
        <div id="previewBox" class="preview-box"></div>
        
        <button id="confirmBtn" class="confirm-btn">Confirm</button>
        
        <label for="fileInput" class="file-label">Load from File</label>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <div id="workspace" class="workspace hidden">
        
        <div class="top-bar">
            <div class="dropdown">
                <button id="menuBtn" class="icon-btn" title="Menu">
                    <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
                </button>
                <div id="menuDropdown" class="dropdown-content">
                    <button id="newFileBtn">New File</button>
                    <div class="dropdown-divider"></div>
                    <button id="savePngBtn">Save as PNG</button>
                    <button id="saveJpegBtn">Save as JPEG</button>
                    <button id="saveSvgBtn">Save as SVG</button>
                    <button id="saveSpeedpaintBtn">Save Speedpaint</button>
                </div>
            </div>
            
            <button class="icon-btn" id="colorBtn" title="Color">
                <svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 0 0 0 18c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01a1.49 1.49 0 0 1-.22-.84c0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zm-5.5 9a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm3-3a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm4.5 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm3 3a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z"/></svg>
            </button>
            
            <button class="icon-btn active" id="brushBtn" title="Brush">
                <svg viewBox="0 0 24 24"><path d="M7 14c-1.66 0-3 1.34-3 3 0 1.31-1.16 2-2 2 .92.62 2.1 1 3.5 1 2.5 0 4.5-2 4.5-4.5 0-.41-.15-.77-.32-1.15l-1.35-2.7L7 14zm14.37-9c.39-.39.39-1.02 0-1.41L19.41.63a.996.996 0 0 0-1.41 0L6.67 11.96l2.37 2.37L21.37 5z"/></svg>
            </button>

            <button class="icon-btn" id="eraserBtn" title="Eraser">
                <svg viewBox="0 0 24 24"><path d="M15.14 3c-.51 0-1.02.2-1.41.59L2.59 14.73c-.78.78-.78 2.05 0 2.83L5.03 20c.39.39.9.59 1.41.59h11.14c.51 0 1.02-.2 1.41-.59l4.43-4.44c.78-.78.78-2.05 0-2.83l-6.87-6.87c-.39-.39-.9-.59-1.41-.59h-1.41zM14 6l6.88 6.88-3 3L11 9l3-3z"/></svg>
            </button>
            
            <button class="icon-btn" id="transformBtn" title="Transform">
                <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4H9V2H2v7h2V5.41l5.17 5.17 1.42-1.41zM14.5 4l5.17 5.17 1.42-1.41L15.91 4H19V2h-7v7h2V5.41zm-5.33 10.59L4 19.76V16H2v7h7v-2H5.41l5.17-5.17-1.41-1.42zM14.5 14.5l1.41-1.42L21 18.24V15h2v7h-7v-2h3.59l-5.1-5.1z"/></svg>
            </button>
            
            <button class="icon-btn" id="lassoBtn" title="Lasso">
                <svg viewBox="0 0 24 24"><path d="M18.06 13.04c.33-.8.44-1.67.31-2.54A5.942 5.942 0 0 0 13 5.06c-.87-.13-1.74-.02-2.54.31L4.63 2.13 3.37 3.63l5.59 3.19C8.36 7.82 8 8.87 8 10c0 2.76 2.24 5 5 5 .13 0 .26-.01.39-.02l2.37 4.15c-.49.19-.88.56-1.08 1.05-.4.93-.05 2.01.81 2.5a1.99 1.99 0 0 0 2.69-.81c.42-.93.02-2.02-.85-2.5l-2.31-4.04c1.17-.41 2.15-1.21 2.84-2.29l2.76 1.58 1.01-1.73-2.58-1.48zm-5.06.46c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg>
            </button>

            <div class="divider"></div>

            <button class="icon-btn" id="undoBtn" title="Undo" disabled>
                <svg viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg>
            </button>
            <button class="icon-btn" id="redoBtn" title="Redo" disabled>
                <svg viewBox="0 0 24 24"><path d="M11.5 8c2.65 0 5.05.99 6.9 2.6L22 7v9h-9l3.62-3.62c-1.39-1.16-3.16-1.88-5.12-1.88-3.54 0-6.55 2.31-7.6 5.5l-2.37-.78C2.92 11.03 6.85 8 11.5 8z"/></svg>
            </button>
        </div>

        <div id="colorPanel" class="color-panel">
            <div class="panel-header">
                <span class="panel-title">Colors</span>
                <button id="closeColorBtn" class="close-panel-btn">&times;</button>
            </div>
            <div class="color-wheel-wrapper">
                <canvas id="colorWheel" width="180" height="180"></canvas>
            </div>
            <div class="hex-input-group">
                <label for="hexInput">HEX</label>
                <input type="text" id="hexInput" value="#000000" maxlength="7">
            </div>
            <div id="paletteGrid" class="palette-grid"></div>
        </div>

        <div class="left-controls">
            <div class="slider-wrapper">
                <span class="slider-label">Size</span>
                <span id="sizeBubble" class="slider-bubble-value">10</span>
                <div id="sizeSlider" class="slider-container">
                    <div id="sizeTrackFill" class="slider-track-fill"></div>
                    <div id="sizeHandle" class="slider-handle"></div>
                </div>
            </div>
            <div class="slider-wrapper">
                <span class="slider-label">Opac</span>
                <span id="opacBubble" class="slider-bubble-value">100</span>
                <div id="opacSlider" class="slider-container">
                    <div id="opacTrackFill" class="slider-track-fill"></div>
                    <div id="opacHandle" class="slider-handle"></div>
                </div>
            </div>
        </div>

        <div id="transformContainer" class="transform-container">
            <canvas id="paintCanvas"></canvas>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
